<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <!-- LayerDrop3D Logo - Full Logo - White on Transparent -->
    <defs>
        <style>
            .logo-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 48px; font-weight: 700; fill: #FFFFFF; letter-spacing: -0.5px; }
            .logo-mono { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #FFFFFF; letter-spacing: 2px; }
        </style>
    </defs>

    <!-- Icon -->
    <g transform="translate(150, 40)">
        <rect x="20" y="72" width="60" height="4" fill="#FFFFFF" opacity="0.4" rx="1"/>
        <rect x="18" y="64" width="64" height="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.95" rx="2"/>
        <rect x="22" y="54" width="56" height="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.75" rx="2"/>
        <rect x="28" y="44" width="44" height="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.6" rx="2"/>
        <rect x="34" y="34" width="32" height="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.5" rx="2"/>
        <rect x="40" y="24" width="20" height="6" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.4" rx="2"/>
        <circle cx="50" cy="20" r="3" fill="#FFFFFF" opacity="0.6"/>
        <line x1="50" y1="17" x2="50" y2="12" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    </g>

    <!-- Text -->
    <text x="200" y="220" text-anchor="middle" class="logo-text">LayerDrop3D</text>
    <text x="200" y="255" text-anchor="middle" class="logo-mono">LD3D</text>
</svg>