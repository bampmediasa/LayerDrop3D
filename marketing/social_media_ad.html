<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerDrop3D - RC Airplane Kits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
        }

        .ad-container {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1b2e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        /* Animated background elements */
        .bg-accent-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -50px;
            right: -50px;
            animation: float 8s ease-in-out infinite;
        }

        .bg-accent-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            left: -50px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        /* Header Section */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00A8FF 0%, #0082CC 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
            box-shadow: 0 8px 16px rgba(0, 168, 255, 0.3);
        }

        .logo-text {
            color: white;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 4px 12px rgba(0, 168, 255, 0.4);
        }

        /* Airplane Silhouette */
        .airplane-section {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }

        .airplane {
            width: 400px;
            height: 200px;
            position: relative;
            filter: drop-shadow(0 8px 20px rgba(0, 168, 255, 0.4));
        }

        /* Fuselage */
        .fuselage {
            position: absolute;
            width: 300px;
            height: 40px;
            background: linear-gradient(90deg, #00A8FF 0%, #00D9FF 50%, #00A8FF 100%);
            border-radius: 20px;
            top: 80px;
            left: 50px;
            box-shadow: 0 4px 12px rgba(0, 168, 255, 0.5);
        }

        /* Cockpit */
        .cockpit {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #00D9FF;
            border-radius: 50%;
            top: 82px;
            left: 280px;
            z-index: 2;
        }

        /* Nose cone */
        .nose {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 0px solid transparent;
            border-top: 20px solid #00A8FF;
            border-bottom: 20px solid #00A8FF;
            top: 80px;
            left: 290px;
            z-index: 1;
        }

        /* Main wings */
        .main-wing {
            position: absolute;
            width: 280px;
            height: 15px;
            background: linear-gradient(to bottom, #00A8FF 0%, #0082CC 100%);
            clip-path: polygon(0% 50%, 30% 0%, 70% 0%, 100% 50%, 70% 100%, 30% 100%);
            top: 92px;
            left: 80px;
            box-shadow: 0 4px 12px rgba(0, 168, 255, 0.4);
        }

        /* Tail wings */
        .tail-wing {
            position: absolute;
            width: 100px;
            height: 12px;
            background: #00A8FF;
            clip-path: polygon(0% 50%, 20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%);
            top: 95px;
            right: 60px;
        }

        /* Vertical stabilizer */
        .vertical-stabilizer {
            position: absolute;
            width: 12px;
            height: 60px;
            background: linear-gradient(to right, #00A8FF 0%, #0082CC 100%);
            top: 70px;
            right: 85px;
            clip-path: polygon(0% 0%, 100% 20%, 100% 80%, 0% 100%);
        }

        /* Content Section */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        .headline {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            line-height: 1.1;
        }

        .subtext {
            font-size: 28px;
            color: #00D9FF;
            margin-bottom: 25px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 168, 255, 0.5);
        }

        .price-section {
            background: rgba(0, 168, 255, 0.1);
            border-left: 4px solid #00A8FF;
            border-right: 4px solid #00A8FF;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: inline-block;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .price-label {
            font-size: 16px;
            color: #00D9FF;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .price {
            font-size: 42px;
            font-weight: bold;
            color: #00A8FF;
            margin-bottom: 8px;
        }

        .shipping {
            font-size: 16px;
            color: #00D9FF;
            letter-spacing: 0.5px;
        }

        /* CTA Button */
        .cta-container {
            margin-top: 20px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #00A8FF 0%, #00D9FF 100%);
            color: #0a0e27;
            padding: 16px 48px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(0, 168, 255, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(0, 168, 255, 0.6);
        }

        .website {
            display: block;
            margin-top: 15px;
            font-size: 18px;
            color: #00D9FF;
            letter-spacing: 0.5px;
            text-decoration: none;
            font-weight: 600;
        }

        .website:hover {
            color: #00A8FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="bg-accent-1"></div>
        <div class="bg-accent-2"></div>

        <div class="header">
            <div class="logo-box">LD</div>
            <div class="logo-text">LAYERDROP3D</div>
        </div>

        <div class="airplane-section">
            <div class="airplane">
                <!-- Nose cone -->
                <div class="nose"></div>
                <!-- Fuselage -->
                <div class="fuselage"></div>
                <!-- Cockpit -->
                <div class="cockpit"></div>
                <!-- Main wings -->
                <div class="main-wing"></div>
                <!-- Tail wing -->
                <div class="tail-wing"></div>
                <!-- Vertical stabilizer -->
                <div class="vertical-stabilizer"></div>
            </div>
        </div>

        <div class="content">
            <h1 class="headline">3D Printed RC Airplane Kits</h1>
            <p class="subtext">Lightweight. Durable. Ready to Fly.</p>

            <div class="price-section">
                <div class="price-label">STARTING AT</div>
                <div class="price">$79.99</div>
                <div class="shipping">FREE SHIPPING OVER $150</div>
            </div>

            <div class="cta-container">
                <button class="cta-button">Shop Now</button>
                <a href="#" class="website">LayerDrop3D.com</a>
            </div>
        </div>
    </div>
</body>
</html>
